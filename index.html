<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="style.css">
        <title>GATO</title>
    </head>
    <body >
        <h1>Juego del Gato</h1>
        <p id="mensaje"></p>
        <div id="configuracion">
            <p>Ingrese el tamaño del tablero (3-7):</p>
            <input type="number" id="tamano" min="3" max="7">
            <button onclick="dibuja()">Empezar juego</button >
        </div>
        <canvas id="lienzo" width="800" height="800" onmousedown="position()"></canvas>
        <button onclick="limpia()" id="nuevoJuego">Nuevo Juego</button >
        <script src="script.js"></script>
    </body>
</html>
